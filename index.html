<!DOCTYPE html><html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Observatorio de Electromovilidad — Aduana Chile</title>
<style>
:root{--blue:#2b5ba8;--blue2:#1e447c;--grn:#4caf50;--bg:#f0f4f0}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{display:flex;flex-direction:column;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:#fff}
.bar{background:linear-gradient(135deg,var(--blue),var(--blue2));padding:0 18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:2}
.brand{display:flex;align-items:center;gap:12px;padding:12px 0}
.logo{width:34px;height:34px;border-radius:8px;background:var(--grn);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
.brand h1{margin:0;font-size:16px;font-weight:700;line-height:1.1}
.brand p{margin:0;font-size:11px;opacity:.85}
.tabs{display:flex;gap:6px;margin-left:auto}
.tabs button{background:transparent;color:#dbe6f7;border:0;border-bottom:3px solid transparent;padding:16px 16px 13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.tabs button:hover{color:#fff}
.tabs button.on{color:#fff;border-bottom-color:var(--grn)}
.framewrap{flex:1;position:relative;background:#fff}
iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
</style></head><body>
<div class="bar">
  <div class="brand"><div class="logo">EF</div>
    <div><h1>Observatorio de Electromovilidad</h1><p>Importaciones · Servicio Nacional de Aduanas (microdato DIN) · Chile 2015–2026</p></div></div>
  <div class="tabs">
    <button id="tV" class="on" onclick="ir('V')">Vehículos</button>
    <button id="tB" onclick="ir('B')">Baterías de litio</button>
  </div>
</div>
<div class="framewrap"><iframe id="fr" title="contenido"></iframe></div>
<script>
const SRC={V:"dashboard_vehiculos.html",B:"revisor_baterias.html"};
function ir(k){
  document.getElementById("fr").src=SRC[k];
  document.getElementById("tV").classList.toggle("on",k=="V");
  document.getElementById("tB").classList.toggle("on",k=="B");
  location.hash=k;
}
ir(location.hash.replace("#","")=="B"?"B":"V");
</script>
</body></html>
